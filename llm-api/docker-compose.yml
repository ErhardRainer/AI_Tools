services:
  llm-api:
    build:
      context: ..                          # Repo-Root als Build-Kontext
      dockerfile: llm-api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # config.json mit API-Keys wird nur eingebunden, nicht ins Image kopiert
      - ../LLM_Client/config.json:/app/LLM_Client/config.json:ro
    environment:
      - LLM_CONFIG=/app/LLM_Client/config.json
      # API_KEY: optionaler HTTP-Schutz für den /chat-Endpunkt.
      # Leer lassen (oder weglassen) für lokale Entwicklung ohne Authentifizierung.
      # Für Produktion: API_KEY=<sicherer-zufallswert> setzen.
      - API_KEY=${API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
